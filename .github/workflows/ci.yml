concurrency:
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
  group: ci-${{ github.ref }}

env:
  CI: "true"
  DO_NOT_TRACK: "1"
jobs:
  check:
    name: Check and Test
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/prepare
      - run: pnpm check-and-test

name: CI

on:
  pull_request: ~
  push:
    branches:
      - main
