description: Prepares the repo for a typical CI job

name: Prepare

runs:
  steps:
    - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
    # pnpm-workspace.yaml included so allowBuilds/ignoredOptionalDependencies
    # changes bust the cache (setup-node only hashes pnpm-lock.yaml by default).
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        cache: pnpm
        cache-dependency-path: |
          pnpm-lock.yaml
          pnpm-workspace.yaml
        node-version: "24"
    - run: pnpm install --frozen-lockfile
      shell: bash
    - uses: rharkor/caching-for-turbo@00a0515f175df9fd2e15c4560144ad5fdbebb0c7 # v2.3.13
  using: composite
