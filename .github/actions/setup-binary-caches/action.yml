description: "Cache binary downloads (canvas native module, HuggingFace ONNX models) to skip re-downloading on repeated runs"
name: "Setup binary caches"
runs:
  steps:
    - name: Cache canvas native module
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        key: canvas-bin-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}
        path: ~/.npm/_prebuilds

    - name: Cache HuggingFace ONNX models
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        key: huggingface-models-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('skills/transformers-js/package.json') }}
        path: ~/.cache/transformers-js
  using: "composite"
